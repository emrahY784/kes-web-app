<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KES - Kutup Eğilim Skoru (Çoklu Kaynak)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f9; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .tab-button { background: #ddd; padding: 10px 20px; cursor: pointer; border: none; margin-right: 5px; }
        .tab-button.active { background: #3498db; color: white; }
        .tab-content { display: none; padding: 20px; border: 1px solid #ddd; margin-top: 10px; border-radius: 5px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 220px; font-weight: bold; }
        select, input { padding: 5px; width: 260px; }
        button { padding: 8px 15px; background: #3498db; color: white; border: none; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        .result { background: #ecf0f1; padding: 15px; margin-top: 20px; border-radius: 5px; }
        .warning { color: #e67e22; }
        .estimated { background-color: #fff3e0; border-left: 4px solid #e67e22; padding: 8px; margin: 10px 0; }
    </style>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 Kutup Eğilim Skoru (KES)</h1>
    <p>Her katsayı için farklı veri kaynağı seçebilirsiniz.</p>

    <div>
        <button class="tab-button active" onclick="openTab('calculate')">Hesapla</button>
        <button class="tab-button" onclick="openTab('trend')">Trend</button>
        <button class="tab-button" onclick="openTab('manual')">Manuel Veri Girişi</button>
    </div>

    <div id="calculate" class="tab-content active">
        <h3>KES Hesapla</h3>
        <div class="form-group">
            <label>Ülke:</label>
            <select id="country"></select>
        </div>
        <div class="form-group">
            <label>Yıl:</label>
            <input type="number" id="year" value="2020">
        </div>
        <div id="sources-container"></div>
        <div class="form-group">
            <label>α (Gini ağırlığı):</label>
            <input type="number" id="alpha" step="0.05" value="0.5">
        </div>
        <div class="form-group">
            <label>β (Otomasyon ağırlığı):</label>
            <input type="number" id="beta" step="0.05" value="0.5">
        </div>
        <div class="form-group">
            <label>γ (Evcilleştirme ağırlığı):</label>
            <input type="number" id="gamma" step="0.05" value="0.5">
        </div>
        <div class="form-group">
            <label>λ (Bilinç ağırlığı):</label>
            <input type="number" id="lambd" step="0.05" value="0.5">
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="geometric"> Geometrik formül</label>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="use_min"> Min formülü</label>
        </div>
        <button onclick="calculateKES()">Hesapla</button>
        <div id="result" class="result"></div>
    </div>

    <div id="trend" class="tab-content">
        <h3>Zaman Serisi Trendi</h3>
        <div class="form-group">
            <label>Ülke:</label>
            <select id="trend_country"></select>
        </div>
        <div class="form-group">
            <label>Başlangıç Yılı:</label>
            <input type="number" id="start_year" value="2000">
        </div>
        <div class="form-group">
            <label>Bitiş Yılı:</label>
            <input type="number" id="end_year" value="2024">
        </div>
        <button onclick="loadTrend()">Grafiği Göster</button>
        <div id="trend_graph"></div>
    </div>

    <div id="manual" class="tab-content">
        <h3>Manuel Veri Ekle / Güncelle</h3>
        <div class="form-group">
            <label>Ülke:</label>
            <input type="text" id="manual_country" placeholder="Turkey">
        </div>
        <div class="form-group">
            <label>Yıl:</label>
            <input type="number" id="manual_year">
        </div>
        <div class="form-group">
            <label>Katsayı Türü:</label>
            <select id="manual_type">
                <option value="gini">Gini</option>
                <option value="automation">Otomasyon</option>
                <option value="governance">Evcilleştirme</option>
                <option value="consciousness">Toplumsal Bilinç</option>
                <option value="resistance">Dış Direnç</option>
            </select>
        </div>
        <div class="form-group">
            <label>Değer (0-100):</label>
            <input type="number" id="manual_value" step="0.1">
        </div>
        <button onclick="saveManual()">Kaydet</button>
        <div id="manual_result" class="result"></div>
    </div>
</div>

<script>
const tables = {{ tables|tojson }};

window.onload = function() {
    loadCountries();
    loadSourceOptions();
};

function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.currentTarget.classList.add('active');
}

async function loadCountries() {
    const res = await fetch('/get_countries');
    const countries = await res.json();
    const selects = ['country', 'trend_country'];
    selects.forEach(id => {
        const select = document.getElementById(id);
        select.innerHTML = '';
        countries.forEach(c => {
            const option = document.createElement('option');
            option.value = c;
            option.textContent = c;
            select.appendChild(option);
        });
    });
}

async function loadSourceOptions() {
    const container = document.getElementById('sources-container');
    container.innerHTML = '';
    for (const [table, label] of Object.entries(tables)) {
        const res = await fetch('/get_sources', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table: table })
        });
        const sources = await res.json();
        const div = document.createElement('div');
        div.className = 'form-group';
        div.innerHTML = `
            <label>${label} Kaynağı:</label>
            <select id="source_${table}">
                ${sources.map(s => `<option value="${s}">${s}</option>`).join('')}
            </select>
        `;
        container.appendChild(div);
    }
}

async function calculateKES() {
    const country = document.getElementById('country').value;
    const year = parseInt(document.getElementById('year').value);
    const alpha = parseFloat(document.getElementById('alpha').value);
    const beta = parseFloat(document.getElementById('beta').value);
    const gamma = parseFloat(document.getElementById('gamma').value);
    const lambd = parseFloat(document.getElementById('lambd').value);
    const geometric = document.getElementById('geometric').checked;
    const use_min = document.getElementById('use_min').checked;

    const sources = {};
    for (const [table, _] of Object.entries(tables)) {
        sources[table] = document.getElementById(`source_${table}`).value;
    }

    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Hesaplanıyor...';
    try {
        const res = await fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ country, year, sources, alpha, beta, gamma, lambd, geometric, use_min })
        });
        const data = await res.json();
        if (data.status === 'error') {
            resultDiv.innerHTML = `<span class="warning">Hata: ${data.message}</span>`;
        } else {
            let yearMsg = '<p><strong>Kullanılan yıllar:</strong><br>';
            for (const [k, v] of Object.entries(data.used_years)) {
                yearMsg += `${k}: ${v}<br>`;
            }
            yearMsg += '</p>';
            
            let estimatedMsg = '';
            let anyEstimated = false;
            for (const [k, v] of Object.entries(data.estimated)) {
                if (v === 1) anyEstimated = true;
            }
            if (anyEstimated) {
                estimatedMsg = '<div class="estimated"><strong>⚠️ Uyarı:</strong> Aşağıdaki katsayılar için tahmini (varsayılan 50) değer kullanılmıştır:<br>';
                for (const [k, v] of Object.entries(data.estimated)) {
                    if (v === 1) estimatedMsg += `- ${k}<br>`;
                }
                estimatedMsg += '</div>';
            }
            
            resultDiv.innerHTML = `
                ${yearMsg}
                ${estimatedMsg}
                <p><strong>KES:</strong> ${data.kes} (${data.interpretation})</p>
                <p><strong>V_iç Skoru:</strong> ${data.v_ic}</p>
                <p><em>Yorum: 0-33 Sermayeci, 34-66 Karma, 67-100 Kamucu</em></p>
            `;
        }
    } catch (err) {
        resultDiv.innerHTML = `<span class="warning">Ağ hatası: ${err.message}</span>`;
    }
}

async function loadTrend() {
    const country = document.getElementById('trend_country').value;
    const start_year = parseInt(document.getElementById('start_year').value);
    const end_year = parseInt(document.getElementById('end_year').value);
    const graphDiv = document.getElementById('trend_graph');
    graphDiv.innerHTML = 'Yükleniyor...';
    try {
        const res = await fetch('/trend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ country, start_year, end_year })
        });
        const data = await res.json();
        if (data.error) {
            graphDiv.innerHTML = `<span class="warning">${data.error}</span>`;
        } else {
            const graph = JSON.parse(data.graph);
            Plotly.newPlot('trend_graph', graph.data, graph.layout);
        }
    } catch (err) {
        graphDiv.innerHTML = `<span class="warning">Hata: ${err.message}</span>`;
    }
}

async function saveManual() {
    const country = document.getElementById('manual_country').value;
    const year = parseInt(document.getElementById('manual_year').value);
    const katsayi_turu = document.getElementById('manual_type').value;
    const value = parseFloat(document.getElementById('manual_value').value);
    if (!country || isNaN(year) || isNaN(value)) {
        alert('Lütfen tüm alanları doldurun.');
        return;
    }
    const res = await fetch('/manual_data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ country, year, katsayi_turu, value })
    });
    const result = await res.json();
    const manualResult = document.getElementById('manual_result');
    if (result.status === 'success') {
        manualResult.innerHTML = `<span style="color:green">${result.message}</span>`;
        loadSourceOptions();
    } else {
        manualResult.innerHTML = `<span class="warning">${result.message}</span>`;
    }
}
</script>
</body>
</html>
