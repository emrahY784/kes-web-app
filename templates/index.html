<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KES - Kutup Eğilim Skoru</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f4f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .tab-button { background: #ddd; padding: 10px 20px; cursor: pointer; border: none; }
        .tab-button.active { background: #3498db; color: white; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        input, select, button { margin: 5px; padding: 8px; }
        .result { background: #ecf0f1; padding: 15px; margin-top: 20px; border-radius: 5px; }
        .year-list { background: #e8f4f8; margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 0.9em; }
    </style>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 Kutup Eğilim Skoru (KES)</h1>
    <div>
        <button class="tab-button active" onclick="openTab('calculate')">Hesapla</button>
        <button class="tab-button" onclick="openTab('trend')">Trend</button>
        <button class="tab-button" onclick="openTab('manual')">Manuel Veri Girişi</button>
        <button class="tab-button" onclick="openTab('api')">API'den Çek</button>
    </div>

    <div id="calculate" class="tab-content active">
        <h3>Hesapla</h3>
        <label>Ülke: 
            <select id="country" onchange="getAvailableYears()">
                {% for c in countries %}
                <option value="{{ c.name }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Yıl: <input type="number" id="year" value="2023"></label>
        <button type="button" onclick="getAvailableYears()">Mevcut Yılları Göster</button>
        <div id="year_list" class="year-list"></div>
        
        <label>α (Gini): <input type="number" id="alpha" step="0.05" value="0.5"></label>
        <label>β (Otomasyon): <input type="number" id="beta" step="0.05" value="0.5"></label>
        <label>γ (Evcilleştirme): <input type="number" id="gamma" step="0.05" value="0.5"></label>
        <label>λ (Bilinç): <input type="number" id="lambd" step="0.05" value="0.5"></label>
        <label><input type="checkbox" id="geometric"> Geometrik formül</label>
        <label><input type="checkbox" id="use_min"> Min formülü</label>
        <button onclick="calculate()">Hesapla</button>
        <div id="result" class="result"></div>
    </div>

    <div id="trend" class="tab-content">
        <h3>Trend</h3>
        <label>Ülke: <select id="trend_country">
            {% for c in countries %}
            <option value="{{ c.name }}">{{ c.name }}</option>
            {% endfor %}
        </select></label>
        <label>Başlangıç Yılı: <input type="number" id="start_year" value="2000"></label>
        <label>Bitiş Yılı: <input type="number" id="end_year" value="2024"></label>
        <button onclick="loadTrend()">Grafiği Göster</button>
        <div id="trend_graph"></div>
    </div>

    <div id="manual" class="tab-content">
        <h3>Manuel Veri Girişi</h3>
        <label>Ülke: <input type="text" id="manual_country" placeholder="Turkey"></label>
        <label>Yıl: <input type="number" id="manual_year" placeholder="2023"></label>
        <label>Gini (0-100): <input type="number" id="manual_gini" step="0.1"></label>
        <label>Otomasyon (0-100): <input type="number" id="manual_automation" step="0.1"></label>
        <label>Evcilleştirme (0-100): <input type="number" id="manual_evcillestirme" step="0.1"></label>
        <label>Bilinç (0-100): <input type="number" id="manual_bilinc" step="0.1"></label>
        <label>Dış Direnç (0-100): <input type="number" id="manual_dis_direnc" step="0.1"></label>
        <button onclick="saveManual()">Kaydet</button>
        <div id="manual_result" class="result"></div>
    </div>

    <div id="api" class="tab-content">
        <h3>API'den Otomatik Veri Çek</h3>
        <label>Ülke Adı: 
            <select id="api_country">
                <option value="Turkey">Turkey</option>
                <option value="United States">United States</option>
                <option value="Germany">Germany</option>
                <option value="China">China</option>
                <option value="Russia">Russia</option>
            </select>
        </label>
        <button onclick="fetchFromAPI()">Dünya Bankası'ndan Gini ve Yönetişim Verilerini Çek</button>
        <div id="api_result" class="result"></div>
    </div>
</div>

<script>
function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.currentTarget.classList.add('active');
}

async function getAvailableYears() {
    const country = document.getElementById('country').value;
    const yearListDiv = document.getElementById('year_list');
    if (!country) return;
    yearListDiv.innerHTML = 'Yükleniyor...';
    try {
        const res = await fetch('/available_years', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ country: country })
        });
        const data = await res.json();
        if (data.error) {
            yearListDiv.innerHTML = '⚠️ ' + data.error;
        } else if (data.years && data.years.length > 0) {
            yearListDiv.innerHTML = '<strong>Mevcut yıllar:</strong> ' + data.years.join(', ');
        } else {
            yearListDiv.innerHTML = '⚠️ Bu ülke için henüz veri yok. Lütfen "API\'den Çek" veya "Manuel Veri Girişi" yapın.';
        }
    } catch (err) {
        yearListDiv.innerHTML = '⚠️ Sunucu hatası: ' + err.message;
    }
}

async function calculate() {
    const country = document.getElementById('country').value;
    const year = parseInt(document.getElementById('year').value);
    const alpha = parseFloat(document.getElementById('alpha').value);
    const beta = parseFloat(document.getElementById('beta').value);
    const gamma = parseFloat(document.getElementById('gamma').value);
    const lambd = parseFloat(document.getElementById('lambd').value);
    const geometric = document.getElementById('geometric').checked;
    const use_min = document.getElementById('use_min').checked;

    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Hesaplanıyor...';
    try {
        const res = await fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ country, year, alpha, beta, gamma, lambd, geometric, use_min })
        });
        const text = await res.text();
        let result;
        try {
            result = JSON.parse(text);
        } catch(e) {
            resultDiv.innerHTML = `<p style="color:red">Sunucu yanıtı JSON değil. İlk 200 karakter: ${text.substring(0,200)}</p>`;
            return;
        }
        if (result.error) {
            resultDiv.innerHTML = `<p style="color:red">${result.error}</p>`;
        } else {
            let yearMsg = '';
            if (result.used_year !== result.requested_year) {
                yearMsg = `<p><em>⚠️ İstenen yıl (${result.requested_year}) için veri yoktu. En yakın yıl (${result.used_year}) kullanıldı.</em></p>`;
            }
            resultDiv.innerHTML = `
                ${yearMsg}
                <p><strong>KES:</strong> ${result.kes} (${result.interpretation})</p>
                <p><strong>V_iç Skoru:</strong> ${result.v_ic_score}</p>
                <p><em>Yorum: 0-33 Sermayeci, 34-66 Karma, 67-100 Kamucu</em></p>
            `;
        }
    } catch (err) {
        resultDiv.innerHTML = `<p style="color:red">Ağ hatası: ${err.message}</p>`;
    }
}

async function loadTrend() {
    const country = document.getElementById('trend_country').value;
    const start_year = parseInt(document.getElementById('start_year').value);
    const end_year = parseInt(document.getElementById('end_year').value);
    const graphDiv = document.getElementById('trend_graph');
    graphDiv.innerHTML = 'Yükleniyor...';
    try {
        const res = await fetch('/trend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ country, start_year, end_year })
        });
        const result = await res.json();
        if (result.error) {
            graphDiv.innerHTML = `<p style="color:red">${result.error}</p>`;
        } else {
            const graph = JSON.parse(result.graph);
            Plotly.newPlot('trend_graph', graph.data, graph.layout);
        }
    } catch (err) {
        graphDiv.innerHTML = `<p style="color:red">Hata: ${err.message}</p>`;
    }
}

async function saveManual() {
    const data = {
        country: document.getElementById('manual_country').value,
        year: parseInt(document.getElementById('manual_year').value),
        gini: parseFloat(document.getElementById('manual_gini').value),
        automation: parseFloat(document.getElementById('manual_automation').value),
        evcillestirme: parseFloat(document.getElementById('manual_evcillestirme').value),
        bilinc: parseFloat(document.getElementById('manual_bilinc').value),
        dis_direnc: parseFloat(document.getElementById('manual_dis_direnc').value)
    };
    const resultDiv = document.getElementById('manual_result');
    resultDiv.innerHTML = 'Kaydediliyor...';
    try {
        const res = await fetch('/manual_data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.error) {
            resultDiv.innerHTML = `<p style="color:red">${result.error}</p>`;
        } else {
            resultDiv.innerHTML = `<p style="color:green">${result.message}</p>`;
            if (document.getElementById('country').value === data.country) getAvailableYears();
        }
    } catch (err) {
        resultDiv.innerHTML = `<p style="color:red">Hata: ${err.message}</p>`;
    }
}

async function fetchFromAPI() {
    const name = document.getElementById('api_country').value;
    const resultDiv = document.getElementById('api_result');
    resultDiv.innerHTML = 'Veri çekiliyor...';
    try {
        const res = await fetch('/fetch_from_api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        });
        const result = await res.json();
        if (result.error) {
            resultDiv.innerHTML = `<p style="color:red">${result.error}</p>`;
        } else {
            resultDiv.innerHTML = `<p style="color:green">${result.message}</p>`;
            if (document.getElementById('country').value === name) getAvailableYears();
        }
    } catch (err) {
        resultDiv.innerHTML = `<p style="color:red">Hata: ${err.message}</p>`;
    }
}

window.onload = getAvailableYears;
</script>
</body>
</html>
